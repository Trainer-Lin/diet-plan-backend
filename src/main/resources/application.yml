server:
  port: 8080

spring:
  application:
    name: diet-plan-backend
  datasource:
    url: jdbc:mysql://localhost:3306/diet_plan?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: replace-with-a-32-char-secret-key
  expire-hours: 24
  issuer: diet-plan-backend

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
