server:
  port: 8080

spring:
  application:
    name: diet-plan-backend
  datasource:
    url: jdbc:h2:mem:diet_plan;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: replace-with-a-32-char-secret-key
  expire-hours: 24
  issuer: diet-plan-backend

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
